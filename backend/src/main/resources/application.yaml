spring:
  application:
    name: hiveapp

  jpa:
    hibernate:
      ddl-auto: validate

hiveapp:
  jwt:
    secret: ${HIVEAPP_JWT_SECRET}
    access-token-expiration: 900s
    refresh-token-expiration: 604800s
  invitation:
    expiry-days: 7
    base-url: ${HIVEAPP_FRONTEND_BASE_URL}

server:
  port: 8080
