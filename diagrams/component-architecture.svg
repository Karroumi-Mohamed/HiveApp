<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="1700" viewBox="0 0 2500 1700" role="img" aria-labelledby="title desc">
  <title id="title">HiveApp Component Architecture - Readable Version</title>
  <desc id="desc">Layered component architecture with custom stream layout from ingress to persistence and startup seeders.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#ecf2fb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 z" fill="#2f4567"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { font: 700 34px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #1f3350; }
      .subtitle { font: 500 17px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #4d6689; }
      .stream { fill:#fff; stroke:#8298b8; stroke-width:2; rx:18; }
      .streamHead { fill:#dde8f9; stroke:#8298b8; stroke-width:2; rx:18; }
      .streamText { font:700 18px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#274163; }
      .box { fill:#fff; stroke:#7e95b4; stroke-width:1.5; rx:10; }
      .boxHead { fill:#edf4ff; stroke:#7e95b4; stroke-width:1.5; }
      .boxName { font:700 14px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#223a5b; }
      .boxBody { font:500 12px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#365176; }
      .edge { stroke:#2f4567; stroke-width:1.7; fill:none; marker-end:url(#arrow); }
      .edgeSoft { stroke:#58749d; stroke-width:1.5; fill:none; stroke-dasharray:8 5; marker-end:url(#arrow); }
      .label { font:600 12px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#2d4568; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2500" height="1700"/>
  <text class="title" x="36" y="54">HiveApp Backend Component Architecture</text>
  <text class="subtitle" x="36" y="82">Custom stream layout: request stream, policy stream, business stream, bootstrap stream, and persistence stream.</text>

  <!-- Request stream -->
  <rect class="stream" x="40" y="120" width="2420" height="250"/>
  <rect class="streamHead" x="40" y="120" width="2420" height="42"/>
  <text class="streamText" x="60" y="148">A) Request and Security Stream</text>

  <rect class="box" x="70" y="184" width="270" height="145"/>
  <rect class="boxHead" x="70" y="184" width="270" height="30"/>
  <text class="boxName" x="84" y="204">API Surface</text>
  <text class="boxBody" x="84" y="228">identity, admin, client, registry controllers</text>
  <text class="boxBody" x="84" y="246">DTO validation boundary</text>
  <text class="boxBody" x="84" y="264">public and authenticated routes</text>

  <rect class="box" x="380" y="184" width="290" height="145"/>
  <rect class="boxHead" x="380" y="184" width="290" height="30"/>
  <text class="boxName" x="394" y="204">Security Filter Chain</text>
  <text class="boxBody" x="394" y="228">stateless session + exception handlers</text>
  <text class="boxBody" x="394" y="246">authentication provider and filter order</text>
  <text class="boxBody" x="394" y="264">permission loader bootstrap</text>

  <rect class="box" x="710" y="184" width="320" height="145"/>
  <rect class="boxHead" x="710" y="184" width="320" height="30"/>
  <text class="boxName" x="724" y="204">JWT and Principal Adapters</text>
  <text class="boxBody" x="724" y="228">JwtAuthenticationFilter (client)</text>
  <text class="boxBody" x="724" y="246">AdminJwtAuthenticationFilter (admin)</text>
  <text class="boxBody" x="724" y="264">UserDetailsService adapters</text>

  <rect class="box" x="1070" y="184" width="320" height="145"/>
  <rect class="boxHead" x="1070" y="184" width="320" height="30"/>
  <text class="boxName" x="1084" y="204">Context Builder</text>
  <text class="boxBody" x="1084" y="228">ContextDetectionFilter</text>
  <text class="boxBody" x="1084" y="246">SecurityContextService</text>
  <text class="boxBody" x="1084" y="264">HiveAppPermissionContext holder</text>

  <rect class="box" x="1430" y="184" width="320" height="145"/>
  <rect class="boxHead" x="1430" y="184" width="320" height="30"/>
  <text class="boxName" x="1444" y="204">Permission Runtime Core</text>
  <text class="boxBody" x="1444" y="228">PermissionResolver + PermissionGuard</text>
  <text class="boxBody" x="1444" y="246">AOP / ByteBuddy auto-guard choices</text>
  <text class="boxBody" x="1444" y="264">decision + denial management</text>

  <rect class="box" x="1790" y="184" width="320" height="145"/>
  <rect class="boxHead" x="1790" y="184" width="320" height="30"/>
  <text class="boxName" x="1804" y="204">Policy Chain</text>
  <text class="boxBody" x="1804" y="228">AdminPolicy - B2bPolicy</text>
  <text class="boxBody" x="1804" y="246">PlanPolicy - UserRolePolicy</text>
  <text class="boxBody" x="1804" y="264">provider fallback matcher</text>

  <!-- Business stream -->
  <rect class="stream" x="40" y="400" width="1600" height="520"/>
  <rect class="streamHead" x="40" y="400" width="1600" height="42"/>
  <text class="streamText" x="60" y="428">B) Business Capability Stream</text>

  <rect class="box" x="70" y="470" width="230" height="150"/>
  <rect class="boxHead" x="70" y="470" width="230" height="30"/>
  <text class="boxName" x="84" y="490">Identity Domain</text>
  <text class="boxBody" x="84" y="514">User entity and repository</text>
  <text class="boxBody" x="84" y="532">register/login/refresh</text>
  <text class="boxBody" x="84" y="550">event publisher</text>

  <rect class="box" x="330" y="470" width="230" height="150"/>
  <rect class="boxHead" x="330" y="470" width="230" height="30"/>
  <text class="boxName" x="344" y="490">Admin Domain</text>
  <text class="boxBody" x="344" y="514">AdminUser, AdminRole, perms</text>
  <text class="boxBody" x="344" y="532">admin auth and governance</text>
  <text class="boxBody" x="344" y="550">super-admin branch</text>

  <rect class="box" x="590" y="470" width="250" height="150"/>
  <rect class="boxHead" x="590" y="470" width="250" height="30"/>
  <text class="boxName" x="604" y="490">Workspace Domain</text>
  <text class="boxBody" x="604" y="514">Account and Company management</text>
  <text class="boxBody" x="604" y="532">Member lifecycle</text>
  <text class="boxBody" x="604" y="550">owner/account isolation</text>

  <rect class="box" x="870" y="470" width="250" height="150"/>
  <rect class="boxHead" x="870" y="470" width="250" height="30"/>
  <text class="boxName" x="884" y="490">RBAC Domain</text>
  <text class="boxBody" x="884" y="514">Role creation and assignment</text>
  <text class="boxBody" x="884" y="532">RolePermission mappings</text>
  <text class="boxBody" x="884" y="550">direct override rules</text>

  <rect class="box" x="1150" y="470" width="250" height="150"/>
  <rect class="boxHead" x="1150" y="470" width="250" height="30"/>
  <text class="boxName" x="1164" y="490">B2B Domain</text>
  <text class="boxBody" x="1164" y="514">Collaboration request lifecycle</text>
  <text class="boxBody" x="1164" y="532">delegated permission slivers</text>
  <text class="boxBody" x="1164" y="550">provider/client constraints</text>

  <rect class="box" x="70" y="650" width="290" height="150"/>
  <rect class="boxHead" x="70" y="650" width="290" height="30"/>
  <text class="boxName" x="84" y="670">Plan and Subscription Domain</text>
  <text class="boxBody" x="84" y="694">plan templates and plan features</text>
  <text class="boxBody" x="84" y="712">subscription overrides snapshot</text>
  <text class="boxBody" x="84" y="730">current price state</text>

  <rect class="box" x="390" y="650" width="290" height="150"/>
  <rect class="boxHead" x="390" y="650" width="290" height="30"/>
  <text class="boxName" x="404" y="670">Quota and Billing</text>
  <text class="boxBody" x="404" y="694">QuotaEnforcer override-first logic</text>
  <text class="boxBody" x="404" y="712">BillingCalculator pricing formula</text>
  <text class="boxBody" x="404" y="730">QuotaExceeded exception path</text>

  <rect class="box" x="710" y="650" width="300" height="150"/>
  <rect class="boxHead" x="710" y="650" width="300" height="30"/>
  <text class="boxName" x="724" y="670">Registry Domain</text>
  <text class="boxBody" x="724" y="694">Module/Feature/Permission catalog</text>
  <text class="boxBody" x="724" y="712">status and visibility management</text>
  <text class="boxBody" x="724" y="730">dependency hub for RBAC and plans</text>

  <!-- Bootstrap stream -->
  <rect class="stream" x="1660" y="400" width="800" height="520"/>
  <rect class="streamHead" x="1660" y="400" width="800" height="42"/>
  <text class="streamText" x="1680" y="428">C) Startup and Event Stream</text>

  <rect class="box" x="1690" y="470" width="350" height="150"/>
  <rect class="boxHead" x="1690" y="470" width="350" height="30"/>
  <text class="boxName" x="1704" y="490">FeatureSeeder (Order 1)</text>
  <text class="boxBody" x="1704" y="514">discover feature providers</text>
  <text class="boxBody" x="1704" y="532">sync modules and features</text>
  <text class="boxBody" x="1704" y="550">refresh quota schema</text>

  <rect class="box" x="2060" y="470" width="370" height="150"/>
  <rect class="boxHead" x="2060" y="470" width="370" height="30"/>
  <text class="boxName" x="2074" y="490">PermissionSeeder (Order 2)</text>
  <text class="boxBody" x="2074" y="514">collect generated permissions</text>
  <text class="boxBody" x="2074" y="532">link permission rows to features</text>
  <text class="boxBody" x="2074" y="550">warn on missing feature mapping</text>

  <rect class="box" x="1690" y="650" width="350" height="150"/>
  <rect class="boxHead" x="1690" y="650" width="350" height="30"/>
  <text class="boxName" x="1704" y="670">PlanSeeder (Order 3)</text>
  <text class="boxBody" x="1704" y="694">seed FREE/PRO/ENTERPRISE</text>
  <text class="boxBody" x="1704" y="712">attach default plan features</text>
  <text class="boxBody" x="1704" y="730">configure quota defaults</text>

  <rect class="box" x="2060" y="650" width="370" height="150"/>
  <rect class="boxHead" x="2060" y="650" width="370" height="30"/>
  <text class="boxName" x="2074" y="670">Domain Events</text>
  <text class="boxBody" x="2074" y="694">UserRegistered -&gt; account + owner member</text>
  <text class="boxBody" x="2074" y="712">AccountCreated -&gt; FREE subscription</text>
  <text class="boxBody" x="2074" y="730">deterministic provisioning chain</text>

  <!-- Persistence stream -->
  <rect class="stream" x="40" y="950" width="2420" height="670"/>
  <rect class="streamHead" x="40" y="950" width="2420" height="42"/>
  <text class="streamText" x="60" y="978">D) Persistence and External Integration Stream</text>

  <rect class="box" x="70" y="1020" width="640" height="240"/>
  <rect class="boxHead" x="70" y="1020" width="640" height="30"/>
  <text class="boxName" x="84" y="1040">Relational Data Platform</text>
  <text class="boxBody" x="84" y="1064">users, admin_*, accounts, companies, members, roles, collaboration_* tables</text>
  <text class="boxBody" x="84" y="1082">plans, plan_features, subscriptions and registry module/feature/permission tables</text>
  <text class="boxBody" x="84" y="1100">JSON columns for quota_schema, quota_configs, and custom_overrides</text>

  <rect class="box" x="740" y="1020" width="560" height="240"/>
  <rect class="boxHead" x="740" y="1020" width="560" height="30"/>
  <text class="boxName" x="754" y="1040">API Contract and Error Normalization</text>
  <text class="boxBody" x="754" y="1064">GlobalExceptionHandler -> ApiError contract</text>
  <text class="boxBody" x="754" y="1082">AuthEntryPoint 401, AccessDeniedHandler 403, quota 402, validation 422, fallback 500</text>
  <text class="boxBody" x="754" y="1100">consistent frontend behavior and incident diagnostics</text>

  <rect class="box" x="1330" y="1020" width="520" height="240"/>
  <rect class="boxHead" x="1330" y="1020" width="520" height="30"/>
  <text class="boxName" x="1344" y="1040">Payment Gateway Abstraction</text>
  <text class="boxBody" x="1344" y="1064">PaymentGateway contract: charge/refund</text>
  <text class="boxBody" x="1344" y="1082">DevPaymentGateway default stub for development</text>
  <text class="boxBody" x="1344" y="1100">replaceable with production processor implementation</text>

  <rect class="box" x="1880" y="1020" width="560" height="240"/>
  <rect class="boxHead" x="1880" y="1020" width="560" height="30"/>
  <text class="boxName" x="1894" y="1040">Operational Signals and Logs</text>
  <text class="boxBody" x="1894" y="1064">security and policy decision logs</text>
  <text class="boxBody" x="1894" y="1082">seeding progress and warning logs</text>
  <text class="boxBody" x="1894" y="1100">billing and quota diagnostics</text>

  <!-- arrows -->
  <path class="edge" d="M340 256 L380 256"/>
  <path class="edge" d="M670 256 L710 256"/>
  <path class="edge" d="M1030 256 L1070 256"/>
  <path class="edge" d="M1390 256 L1430 256"/>
  <path class="edge" d="M1750 256 L1790 256"/>

  <path class="edge" d="M2110 256 C2200 300, 2200 470, 2060 470"/>
  <text class="label" x="2140" y="360">policy outcome gates business entry</text>

  <path class="edge" d="M840 550 C960 620, 1120 620, 1150 550"/>
  <path class="edgeSoft" d="M1010 730 C1180 820, 1450 820, 1690 730"/>
  <path class="edgeSoft" d="M860 730 C700 820, 580 860, 520 1020"/>
  <path class="edgeSoft" d="M2200 800 C2200 880, 2160 940, 2160 1020"/>
  <path class="edge" d="M520 1180 L740 1180"/>
  <path class="edge" d="M1300 1180 L1330 1180"/>
  <path class="edge" d="M1850 1180 L1880 1180"/>

  <text class="subtitle" x="36" y="1670">Designed for architecture reviews: clear streams, explicit dependencies, and startup/runtime separation.</text>
</svg>
