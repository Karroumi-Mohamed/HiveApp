<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1500" viewBox="0 0 2200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Permission Policy Sieve Flow - Readable Version</title>
  <desc id="desc">Decision flow diagram for PermissionGuard and policy chain with short-circuit behavior and denial handling.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf3fb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 z" fill="#2f4567"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { font:700 34px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#1f3350; }
      .subtitle { font:500 17px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#4d6689; }
      .node { fill:#fff; stroke:#8097b7; stroke-width:1.6; rx:10; }
      .nodeGood { fill:#dbf2e5; stroke:#6d9f86; }
      .nodeBad { fill:#ffdcdc; stroke:#b67b7b; }
      .nodeNeutral { fill:#edf4ff; }
      .d { fill:#fff; stroke:#8097b7; stroke-width:1.6; }
      .head { font:700 14px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#223b5b; text-anchor:middle; }
      .body { font:500 12px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#355176; text-anchor:middle; }
      .edge { stroke:#2f4567; stroke-width:1.7; fill:none; marker-end:url(#arrow); }
      .edgeDash { stroke:#58749d; stroke-width:1.5; fill:none; stroke-dasharray:7 5; marker-end:url(#arrow); }
      .tag { font:700 12px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#2c4466; }
      .note { fill:#fff; stroke:#97adca; stroke-width:1.3; rx:10; }
      .noteText { font:500 12px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill:#365176; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2200" height="1500"/>
  <text class="title" x="36" y="52">PermissionGuard Policy Sieve - Decision Diagram</text>
  <text class="subtitle" x="36" y="80">Custom funnel layout for quick reasoning about GRANTED / DENIED / ABSTAIN behavior and fallback effects.</text>

  <rect class="node nodeNeutral" x="920" y="120" width="360" height="86"/>
  <text class="head" x="1100" y="152">Start check(permission, context)</text>
  <text class="body" x="1100" y="174">called by auto-guard or manual check</text>

  <polygon class="d nodeNeutral" points="1100,250 1260,330 1100,410 940,330"/>
  <text class="head" x="1100" y="326">testPermissions set?</text>
  <text class="body" x="1100" y="346">ThreadLocal test scope</text>

  <rect class="node nodeNeutral" x="1330" y="286" width="280" height="88"/>
  <text class="head" x="1470" y="318">Direct match path</text>
  <text class="body" x="1470" y="340">matches(required, testAuthorities)</text>

  <polygon class="d nodeNeutral" points="1470,410 1610,480 1470,550 1330,480"/>
  <text class="head" x="1470" y="474">match?</text>

  <rect class="node nodeGood" x="1680" y="438" width="250" height="80"/>
  <text class="head" x="1805" y="468">ALLOW</text>
  <text class="body" x="1805" y="490">return immediately</text>

  <rect class="node nodeBad" x="1680" y="540" width="250" height="90"/>
  <text class="head" x="1805" y="572">DENY</text>
  <text class="body" x="1805" y="594">handleDenial(...)</text>
  <text class="body" x="1805" y="612">(test scope)</text>

  <!-- policy funnel -->
  <rect class="node nodeNeutral" x="860" y="470" width="480" height="72"/>
  <text class="head" x="1100" y="498">Policy funnel (ordered, short-circuit)</text>
  <text class="body" x="1100" y="518">Admin -> B2B -> Plan -> UserRole -> Provider fallback</text>

  <rect class="node" x="860" y="570" width="480" height="70"/>
  <text class="head" x="1100" y="596">1) AdminPermissionPolicy</text>
  <text class="body" x="1100" y="616">super admin grant, non-super admin deny, others abstain</text>

  <rect class="node" x="860" y="660" width="480" height="70"/>
  <text class="head" x="1100" y="686">2) B2bCollaborationPolicy</text>
  <text class="body" x="1100" y="706">active collaboration + delegated permission sliver</text>

  <rect class="node" x="860" y="750" width="480" height="70"/>
  <text class="head" x="1100" y="776">3) PlanPolicy</text>
  <text class="body" x="1100" y="796">active/trial subscription + feature entitlement</text>

  <rect class="node" x="860" y="840" width="480" height="70"/>
  <text class="head" x="1100" y="866">4) UserRolePolicy</text>
  <text class="body" x="1100" y="886">direct override first, role union fallback</text>

  <rect class="node" x="860" y="930" width="480" height="76"/>
  <text class="head" x="1100" y="956">5) Provider fallback</text>
  <text class="body" x="1100" y="976">PermissionPolicy.fromProvider() authority matching</text>

  <polygon class="d nodeNeutral" points="1100,1050 1260,1130 1100,1210 940,1130"/>
  <text class="head" x="1100" y="1124">final result?</text>
  <text class="body" x="1100" y="1144">any granted / denied / all abstain</text>

  <rect class="node nodeGood" x="1340" y="1088" width="280" height="84"/>
  <text class="head" x="1480" y="1118">ALLOW</text>
  <text class="body" x="1480" y="1140">endpoint execution continues</text>

  <rect class="node nodeBad" x="1340" y="1196" width="280" height="96"/>
  <text class="head" x="1480" y="1228">DENY</text>
  <text class="body" x="1480" y="1250">handleDenial(permission, authorities)</text>
  <text class="body" x="1480" y="1270">default reason: POLICY_RESTRICTION</text>

  <polygon class="d nodeNeutral" points="1480,1322 1620,1390 1480,1458 1340,1390"/>
  <text class="head" x="1480" y="1384">dryRun?</text>

  <rect class="node nodeBad" x="1680" y="1350" width="250" height="78"/>
  <text class="head" x="1805" y="1378">THROW</text>
  <text class="body" x="1805" y="1400">PermissionDeniedException</text>

  <rect class="node nodeNeutral" x="1680" y="1440" width="250" height="78"/>
  <text class="head" x="1805" y="1468">LOG ONLY</text>
  <text class="body" x="1805" y="1490">dry-run warning, no throw</text>

  <!-- Side semantics -->
  <rect class="node nodeGood" x="220" y="640" width="220" height="70"/>
  <text class="head" x="330" y="666">GRANTED</text>
  <text class="body" x="330" y="686">stop and allow</text>

  <rect class="node nodeBad" x="220" y="740" width="220" height="70"/>
  <text class="head" x="330" y="766">DENIED</text>
  <text class="body" x="330" y="786">stop and deny</text>

  <rect class="node nodeNeutral" x="220" y="840" width="220" height="70"/>
  <text class="head" x="330" y="866">ABSTAIN</text>
  <text class="body" x="330" y="886">continue to next policy</text>

  <!-- connectors -->
  <path class="edge" d="M1100 206 L1100 250"/>
  <path class="edge" d="M1260 330 L1330 330"/>
  <text class="tag" x="1278" y="320">yes</text>
  <path class="edge" d="M1470 374 L1470 410"/>
  <path class="edge" d="M1610 480 L1680 478"/>
  <text class="tag" x="1622" y="470">yes</text>
  <path class="edge" d="M1470 550 L1680 584"/>
  <text class="tag" x="1560" y="590">no</text>

  <path class="edge" d="M1100 410 L1100 470"/>
  <text class="tag" x="1028" y="444">no</text>

  <path class="edge" d="M1100 542 L1100 570"/>
  <path class="edge" d="M1100 640 L1100 660"/>
  <path class="edge" d="M1100 730 L1100 750"/>
  <path class="edge" d="M1100 820 L1100 840"/>
  <path class="edge" d="M1100 910 L1100 930"/>
  <path class="edge" d="M1100 1006 L1100 1050"/>

  <path class="edge" d="M1260 1130 L1340 1130"/>
  <text class="tag" x="1274" y="1120">granted</text>
  <path class="edge" d="M1100 1210 C1100 1240, 1270 1240, 1340 1240"/>
  <text class="tag" x="1130" y="1234">denied or all abstain</text>

  <path class="edge" d="M1480 1292 L1480 1322"/>
  <path class="edge" d="M1620 1390 L1680 1390"/>
  <text class="tag" x="1628" y="1380">no</text>
  <path class="edge" d="M1480 1458 L1680 1478"/>
  <text class="tag" x="1568" y="1490">yes</text>

  <path class="edgeDash" d="M860 604 C650 604, 560 674, 440 674"/>
  <path class="edgeDash" d="M860 694 C640 694, 560 774, 440 774"/>
  <path class="edgeDash" d="M860 874 C640 874, 560 874, 440 874"/>

  <!-- Notes -->
  <rect class="note" x="40" y="120" width="780" height="120"/>
  <text class="noteText" x="60" y="146">Interpretation</text>
  <text class="noteText" x="60" y="168">- The chain is deterministic and ordered in SecurityConfig.</text>
  <text class="noteText" x="60" y="190">- Each policy can return GRANTED, DENIED, or ABSTAIN.</text>
  <text class="noteText" x="60" y="212">- First non-ABSTAIN decision ends evaluation immediately.</text>

  <rect class="note" x="40" y="1210" width="780" height="180"/>
  <text class="noteText" x="60" y="1238">Operational implications</text>
  <text class="noteText" x="60" y="1260">1) ABSTAIN-heavy flows reach later policies and fallback matcher more often.</text>
  <text class="noteText" x="60" y="1282">2) Denial path is standardized for API responses through shared handlers.</text>
  <text class="noteText" x="60" y="1304">3) dryRun allows staged rollout without enforcement breakage.</text>
  <text class="noteText" x="60" y="1326">4) Context quality directly impacts B2B, plan, and role policy correctness.</text>

  <text class="subtitle" x="36" y="1486">Readable decision reference for security audits and troubleshooting.</text>
</svg>
