<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1700" viewBox="0 0 2400 1700" role="img" aria-labelledby="title desc">
  <title id="title">Request Authorization Sequence - Readable Version</title>
  <desc id="desc">Professional sequence diagram for JWT auth, context detection, auto-guard permission check, policy sieve, and endpoint execution.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#edf3fb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 z" fill="#2d4363"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { font: 700 34px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #1f3350; }
      .subtitle { font: 500 17px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #4d668a; }
      .part { fill: #fff; stroke: #8096b6; stroke-width: 1.6; rx: 10; }
      .partText { font: 700 14px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #223a59; }
      .life { stroke: #95aac8; stroke-width: 1.5; stroke-dasharray: 7 6; }
      .msg { stroke: #2d4363; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .ret { stroke: #55729c; stroke-width: 1.5; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .text { font: 600 12px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #243d5f; }
      .alt { fill: #f3f8ff; stroke: #8ea5c4; stroke-width: 1.4; rx: 10; }
      .altText { font: 700 13px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #2b4365; }
      .note { fill: #fff; stroke: #97adc9; stroke-width: 1.3; rx: 10; }
      .noteText { font: 500 12px 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; fill: #375277; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2400" height="1700"/>
  <text class="title" x="36" y="52">Request Sequence - Auth, Context, Guard, Policy Sieve</text>
  <text class="subtitle" x="36" y="80">Readable UML sequence for a secured endpoint call (client or admin token paths).</text>

  <!-- Participants -->
  <g>
    <rect class="part" x="40" y="110" width="180" height="52"/><text class="partText" x="58" y="141">Caller</text>
    <rect class="part" x="260" y="110" width="220" height="52"/><text class="partText" x="278" y="141">SecurityChain</text>
    <rect class="part" x="520" y="110" width="220" height="52"/><text class="partText" x="536" y="141">JWT Filters</text>
    <rect class="part" x="780" y="110" width="250" height="52"/><text class="partText" x="798" y="141">ContextDetectionFilter</text>
    <rect class="part" x="1070" y="110" width="220" height="52"/><text class="partText" x="1088" y="141">Controller</text>
    <rect class="part" x="1330" y="110" width="230" height="52"/><text class="partText" x="1348" y="141">Permission Runtime</text>
    <rect class="part" x="1600" y="110" width="220" height="52"/><text class="partText" x="1618" y="141">Policy Sieve</text>
    <rect class="part" x="1860" y="110" width="220" height="52"/><text class="partText" x="1880" y="141">Domain Service</text>
    <rect class="part" x="2120" y="110" width="200" height="52"/><text class="partText" x="2144" y="141">Repository/DB</text>
  </g>

  <!-- Lifelines -->
  <g>
    <line class="life" x1="130" y1="162" x2="130" y2="1560"/>
    <line class="life" x1="370" y1="162" x2="370" y2="1560"/>
    <line class="life" x1="630" y1="162" x2="630" y2="1560"/>
    <line class="life" x1="905" y1="162" x2="905" y2="1560"/>
    <line class="life" x1="1180" y1="162" x2="1180" y2="1560"/>
    <line class="life" x1="1445" y1="162" x2="1445" y2="1560"/>
    <line class="life" x1="1710" y1="162" x2="1710" y2="1560"/>
    <line class="life" x1="1970" y1="162" x2="1970" y2="1560"/>
    <line class="life" x1="2220" y1="162" x2="2220" y2="1560"/>
  </g>

  <!-- Main flow -->
  <line class="msg" x1="130" y1="220" x2="370" y2="220"/>
  <text class="text" x="150" y="212">1. HTTP request with Bearer token and optional context headers</text>

  <line class="msg" x1="370" y1="260" x2="630" y2="260"/>
  <text class="text" x="390" y="252">2. run JWT auth filters (client/admin split)</text>

  <line class="msg" x1="630" y1="300" x2="630" y2="300"/>
  <text class="text" x="650" y="304">3. validate token, parse claims, enforce tokenType</text>

  <line class="ret" x1="630" y1="340" x2="370" y2="340"/>
  <text class="text" x="390" y="332">4. SecurityContext principal set (HiveAppUserDetails)</text>

  <line class="msg" x1="370" y1="380" x2="905" y2="380"/>
  <text class="text" x="520" y="372">5. ContextDetectionFilter executes</text>

  <line class="msg" x1="905" y1="420" x2="905" y2="420"/>
  <text class="text" x="925" y="424">6. SecurityContextService.validateAndBuild(...)</text>

  <line class="ret" x1="905" y1="460" x2="370" y2="460"/>
  <text class="text" x="520" y="452">7. HiveAppPermissionContext available in thread holder</text>

  <line class="msg" x1="370" y1="500" x2="1180" y2="500"/>
  <text class="text" x="720" y="492">8. route to controller method</text>

  <line class="msg" x1="1180" y1="540" x2="1445" y2="540"/>
  <text class="text" x="1200" y="532">9. auto-guard resolve(method) and check(permission)</text>

  <line class="msg" x1="1445" y1="580" x2="1710" y2="580"/>
  <text class="text" x="1470" y="572">10. evaluate policy chain in configured order</text>

  <line class="ret" x1="1710" y1="620" x2="1445" y2="620"/>
  <text class="text" x="1480" y="612">11. decision: GRANTED or DENIED</text>

  <line class="msg" x1="1445" y1="660" x2="1180" y2="660"/>
  <text class="text" x="1200" y="652">12. if granted, continue endpoint execution</text>

  <line class="msg" x1="1180" y1="700" x2="1970" y2="700"/>
  <text class="text" x="1520" y="692">13. invoke business service</text>

  <line class="msg" x1="1970" y1="740" x2="2220" y2="740"/>
  <text class="text" x="1990" y="732">14. repository query/command</text>

  <line class="ret" x1="2220" y1="780" x2="1970" y2="780"/>
  <line class="ret" x1="1970" y1="820" x2="1180" y2="820"/>
  <line class="ret" x1="1180" y1="860" x2="370" y2="860"/>
  <line class="ret" x1="370" y1="900" x2="130" y2="900"/>
  <text class="text" x="152" y="892">15. HTTP success response (2xx)</text>

  <!-- Alt branches -->
  <rect class="alt" x="520" y="980" width="920" height="130"/>
  <text class="altText" x="540" y="1004">ALT A - Invalid token or tokenType mismatch</text>
  <text class="text" x="540" y="1030">A1. JWT filter rejects token and does not authenticate principal</text>
  <text class="text" x="540" y="1052">A2. AuthEntryPoint returns 401 with standardized ApiError body</text>
  <text class="text" x="540" y="1074">A3. Request exits before context and permission layers</text>

  <rect class="alt" x="1460" y="980" width="860" height="150"/>
  <text class="altText" x="1480" y="1004">ALT B - Permission denied by policy sieve</text>
  <text class="text" x="1480" y="1030">B1. PermissionGuard receives DENIED (or all abstain fallback false)</text>
  <text class="text" x="1480" y="1052">B2. PermissionDeniedException emitted</text>
  <text class="text" x="1480" y="1074">B3. AccessDeniedHandler/GlobalExceptionHandler returns 403 ApiError</text>
  <text class="text" x="1480" y="1096">B4. Service and repository layers are not executed</text>

  <!-- Explanatory note -->
  <rect class="note" x="40" y="1160" width="2280" height="330"/>
  <text class="noteText" x="62" y="1190">Key implementation notes</text>
  <text class="noteText" x="62" y="1218">1) Controller methods annotated with PermissionNode are automatically guarded when auto-guard is active.</text>
  <text class="noteText" x="62" y="1244">2) ContextDetectionFilter establishes actor and scope context used by B2bCollaborationPolicy, PlanPolicy, and UserRolePolicy.</text>
  <text class="noteText" x="62" y="1270">3) Policy order matters because decisions short-circuit; this prevents unnecessary database checks after a decisive policy outcome.</text>
  <text class="noteText" x="62" y="1296">4) Provider fallback policy bridges framework authorities into PermissionGuard matching semantics.</text>
  <text class="noteText" x="62" y="1322">5) Denials are normalized to API contracts through shared exception handlers.</text>
  <text class="noteText" x="62" y="1348">6) This sequence captures both CLIENT and ADMIN token paths at the authentication stage.</text>
  <text class="noteText" x="62" y="1374">7) For B2B requests, collaboration validity and delegated permission checks happen inside policy evaluation, not at controller boundary alone.</text>
  <text class="noteText" x="62" y="1400">8) For plan-limited features, access decision happens before quota checks; quota applies only when operation is already authorized.</text>

  <text class="subtitle" x="36" y="1646">Readable sequence baseline for security and authorization reviews.</text>
</svg>
