services:
  db:
    image: postgres:16-alpine
    container_name: hiveapp-db
    environment:
      POSTGRES_DB: hiveapp
      POSTGRES_USER: hiveapp
      POSTGRES_PASSWORD: hiveapp123
    ports:
      - "5432:5432"
    volumes:
      - hiveapp-db-data:/var/lib/postgresql/data

volumes:
  hiveapp-db-data:
